<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>MHREDC / Transformational Regional Initiatives</title>

<!-- MapLibre -->
<link href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>

<!-- Papa Parse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
}

/* Sidebar */
#sidebar {
    position: absolute;
    top: 0;
    left: 0;
    width: 240px;
    height: 100vh;
    background: white;
    padding: 12px;
    z-index: 1;
    border-right: 1px solid #ddd;
}

/* Map */
#map {
    position: absolute;
    top: 0;
    left: 240px;
    right: 0;
    bottom: 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <h3>Layers</h3>

    <label>
        <input type="checkbox" id="toggle-sheets" checked>
        Opportunity Sites
    </label>

    <br><br>

    <label>
        <input type="checkbox" id="toggle-rest" checked>
        Counties
    </label>
</div>

<!-- MAP -->
<div id="map"></div>

<script>

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOmFRs9WqWbsV18n0Ulujr-yNGiyEfFmiDzKQEXBuDBh-Cak-ZQdhczddXWLnRQcDk_1dmAawjtqb6/pub?output=csv";

const restURL = "https://services6.arcgis.com/EbVsqZ18sv1kVJ3k/arcgis/rest/services/NYS_Civil_Boundaries/FeatureServer/2/query?where=NAME='Westchester' OR NAME='Rockland' OR NAME='Sullivan' OR NAME='Putnam' OR NAME='Ulster' OR NAME='Orange' OR NAME='Dutchess' &outFields=*&f=geojson";

const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/positron', // Change OpenFreeMap Style
    center: [-73.9209, 41.2901],
    zoom: 8 // Change zoom level
});

let sheetLayerLoaded = false;
let restLayerLoaded = false;

/* =========================
   LOAD MAP
========================= */

map.on('load', () => {

    /* =========================
       1. GOOGLE SHEET LAYER
    ========================= */

    Papa.parse(csvURL, {
        download: true,
        header: true,

        complete: function(results) {

            const geojson = {
                type: "FeatureCollection",
                features: results.data
                    .filter(r => r.Latitude && r.Longitude)
                    .map(r => ({
                        type: "Feature",
                        geometry: {
                            type: "Point",
                            coordinates: [
                                parseFloat(r.Longitude),
                                parseFloat(r.Latitude)
                            ]
                        },
                        properties: r
                    }))
            };

            map.addSource('sheet-data', {
                type: 'geojson',
                data: geojson
            });

            map.addLayer({
                id: 'sheet-layer',
                type: 'circle',
                source: 'sheet-data',
                paint: {
                    'circle-radius': 6,
                    'circle-color': '#2563eb',
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#fff'
                }
            });

            sheetLayerLoaded = true;

        }
    });

    /* =========================
       2. REST LAYER
    ========================= */

    fetch(restURL)
        .then(r => r.json())
        .then(data => {

            map.addSource('rest-data', {
                type: 'geojson',
                data: data
            });

            map.addLayer({
                id: 'rest-layer',
                type: 'fill',
                source: 'rest-data',
                paint: {
                    'fill-color': '#f59e0b',
                    'fill-opacity': 0.3,
                    'fill-outline-color': '#b45309'
                }
            });

            restLayerLoaded = true;

        });

    /* =========================
       3. UI CONTROLS
    ========================= */

    function toggleLayer(id, visible) {
        if (!map.getLayer(id)) return;

        map.setLayoutProperty(
            id,
            'visibility',
            visible ? 'visible' : 'none'
        );
    }

    document.getElementById('toggle-sheets')
        .addEventListener('change', (e) => {
            toggleLayer('sheet-layer', e.target.checked);
        });

    document.getElementById('toggle-rest')
        .addEventListener('change', (e) => {
            toggleLayer('rest-layer', e.target.checked);
        });

});

</script>

</body>
</html>
